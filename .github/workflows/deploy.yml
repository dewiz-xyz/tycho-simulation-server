name: Build & Push Docker Image

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1

jobs:
  determine-env:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      ecr_suffix: ${{ steps.env.outputs.ecr_suffix }}
    steps:
      - id: env
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ inputs.environment }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            ENV="$INPUT_ENV"
          else
            ENV="staging"
          fi
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          if [ "$ENV" = "production" ]; then
            echo "ecr_suffix=mainnet" >> "$GITHUB_OUTPUT"
          else
            echo "ecr_suffix=testnet" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build & Push
    needs: determine-env
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - uses: docker/setup-buildx-action@v3

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/tycho-simulator-${{ needs.determine-env.outputs.ecr_suffix }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/tycho-simulator-${{ needs.determine-env.outputs.ecr_suffix }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
